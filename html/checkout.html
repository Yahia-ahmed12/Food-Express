<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodExpress | Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../css/checkout.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary mb-5 sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="dashboard.html">
                FoodExpress
            </a>

            <div class="ms-auto d-flex align-items-center gap-4">
                <a href="favorites.html" class="text-white position-relative" style="text-decoration: none;">
                    <i class="fas fa-heart fa-lg text-danger"></i>
                    <span id="favCount"
                        class="badge rounded-pill bg-danger position-absolute top-0 start-100 translate-middle"
                        style="display: none;">0</span>
                </a>

                <div class="d-flex align-items-center gap-2">
                    <img id="navUserImg" src="" class="rounded-circle" width="35" height="35" alt="Profile">
                    <span id="navUserName" class="text-white fw-bold">Guest</span>
                </div>

                <button onclick="logout()" class="btn btn-logout" title="Logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container py-2">
        <div class="row g-4">
            <div class="col-lg-7">
                <h4 class="mb-4 text-white">
                    <i class="fas fa-shopping-cart me-2 text-warning"></i>Your Order Summary
                </h4>
                <div id="checkoutItems" class="checkout-card mb-4">
                </div>
                <a href="dashboard.html" class="text-warning text-decoration-none fw-bold">
                    <i class="fas fa-arrow-left me-2"></i>Back to Menu
                </a>
            </div>

            <div class="col-lg-5">
                <h4 class="mb-4 text-white">
                    <i class="fas fa-credit-card me-2 text-warning"></i>Payment Details
                </h4>
                <div class="checkout-card p-4 shadow-lg" style="background: #242424; border-radius: 15px; color: #fff;">
                    <form id="paymentForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-warning">Full Name</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary" id="userName"
                                placeholder="Enter Your Name" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-warning">Delivery Address</label>
                            <textarea class="form-control bg-dark text-white border-secondary" id="userAddress" rows="2"
                                placeholder="Enter your full street address..." required></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <label class="form-label small fw-bold text-warning">Payment Method</label>
                                <select class="form-select bg-dark text-white border-secondary" id="paymentMethod">
                                    <option value="cash">Cash on Delivery</option>
                                    <option value="card">Credit Card (Online)</option>
                                </select>
                            </div>
                        </div>

                        <hr class="my-4" style="border-color: #444;">

                        <div class="d-flex justify-content-between mb-2 text-white-50">
                            <span>Subtotal</span>
                            <span id="subtotal" class="fw-bold text-white">$0.00</span>
                        </div>

                        <div class="d-flex justify-content-between mb-2 text-white-50">
                            <span>Delivery Fee</span>
                            <span id="deliveryFeeDisplay" class="text-success fw-bold">$0.00</span>
                        </div>

                        <div class="d-flex justify-content-between mb-4 fw-bold fs-5">
                            <span>Total</span>
                            <span id="totalPrice" class="text-warning">$0.00</span>
                        </div>

                        <button type="submit"
                            class="btn btn-warning w-100 btn-confirm text-dark fw-bold py-2 fs-5 shadow">
                            CONFIRM ORDER
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module" src="../js/checkout.js"></script>

    <script src="../js/common.js"></script>

</body>

</html>
