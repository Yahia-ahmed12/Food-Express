<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - FoodExpress</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../css/settings.css">
</head>

<body class=" text-white" style="background-color:#1a1b20 !important;">

    <nav class="navbar navbar-dark bg-dark border-bottom border-secondary p-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="dashboard.html">
                FoodExpress
            </a>
            <a href="dashboard.html" class="btn btn-outline-warning btn-sm rounded-pill px-4">
                <i class="fas fa-arrow-left me-2"></i>Back
            </a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h2 class="fw-bold mb-4"><i class="fas fa-cog text-warning me-2"></i>Settings</h2>

                <div class="settings-card p-4 mb-4">
                    <h5 class="text-warning mb-4"><i class="fas fa-shield-alt me-2"></i>Security Settings</h5>
                    <form id="changePassForm">
                        <div class="mb-3">
                            <label class="form-label small">Current Password</label>
                            <input type="password" id="currentPass"
                                class="form-control bg-secondary border-0 text-white" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">New Password</label>
                            <input type="password" id="newPass" class="form-control bg-secondary border-0 text-white"
                                required>
                        </div>
                        <button type="submit" class="btn btn-warning fw-bold px-4">Update Password</button>
                    </form>
                </div>

                <div class="settings-card p-4">
                    <h5 class="text-warning mb-4"><i class="fas fa-sliders-h me-2"></i>Application Preferences</h5>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <h6 class="mb-0">Push Notifications</h6>
                            <small class="text-white-50">Receive updates about your order status.</small>
                        </div>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="notifySwitch" checked>
                        </div>
                    </div>

                    <hr class="border-secondary">

                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <div>
                            <h6 class="mb-0">Default Payment</h6>
                            <small class="text-white-50">Choose how you prefer to pay.</small>
                        </div>
                        <select id="paymentDefaultSelect" class="form-select bg-secondary border-0 text-white w-auto">
                            <option value="cash">Cash on Delivery</option>
                            <option value="card">Credit Card</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../js/settings.js"></script>
</body>

</html>
