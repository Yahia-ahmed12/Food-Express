<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favorites | FoodDash</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/home.css">
    <link rel="stylesheet" href="../css/favorites.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm"
        style="background-color: #212529 !important;">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning fs-3" href="dashboard.html">
                <i class="fas fa-arrow-left me-2 text-white" style="font-size: 1.2rem; cursor: pointer;"
                    onclick="window.location.href='dashboard.html'"></i>
                Food<span style="color: #fff;">Express</span>
            </a>

            <div class="d-flex align-items-center ms-auto">
                <div class="favorite-icon-wrapper me-4">
                    <a href="favorites.html" class="text-white position-relative" style="text-decoration: none;">
                        <i class="fas fa-heart fa-lg text-danger"></i>
                        <span id="favCount"
                            class="badge rounded-pill bg-danger position-absolute top-0 start-100 translate-middle"
                            style="font-size: 0.6rem; display: none;">
                            0
                        </span>
                    </a>
                </div>

                <div class="cart-icon-wrapper">
                    <a href="checkout.html" class="text-white position-relative" style="text-decoration: none;">
                        <i class="fas fa-shopping-cart fa-lg"></i>
                        <span id="cartCount"
                            class="badge rounded-pill bg-danger position-absolute top-0 start-100 translate-middle"
                            style="font-size: 0.6rem; display: none;">
                            0
                        </span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <header class="favorites-header text-center">
        <div class="container">
            <h2 class="fw-bold"><i class="fas fa-heart text-danger me-2"></i> Your Wishlist</h2>
            <p class="text-white-50">Quick access to the restaurants you love most.</p>
        </div>
    </header>

    <main class="container mb-5">
        <div id="favoritesContainer" class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-3">
        </div>

        <div id="emptyState" class="text-center py-5 d-none">
            <div class="empty-state">
                <i class="fas fa-heart-broken fa-5x mb-4"></i>
                <h3 class="text-white">Your wishlist is empty!</h3>
                <p class="text-white-50">Explore our menu and heart your favorite spots.</p>
                <a href="dashboard.html" class="btn btn-warning px-5 py-2 fw-bold mt-3">Back to Explore</a>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/favorites.js"></script>
</body>

</html>
