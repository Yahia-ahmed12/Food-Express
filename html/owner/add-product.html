<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product | Owner Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="../../css/owner/add-product.css">
</head>

<body style="background-color: #1a1b20; color: white; font-family: 'Oswald', sans-serif;">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="d-flex align-items-center mb-4">
                    <button onclick="history.back()" class="btn btn-outline-light me-3">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <h2 class="mb-0">Add <span class="text-warning">New Product</span></h2>
                </div>

                <div class="form-container shadow-lg"
                    style="background: #23242a; padding: 30px; border-radius: 15px; border: 1px solid #34353c;">
                    <form id="addProductForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted small">PRODUCT NAME</label>
                                <input type="text" id="prodName" class="form-control" placeholder="e.g. Cheese Burger"
                                    required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label text-muted small">PRICE ($)</label>
                                <input type="number" id="prodPrice" class="form-control" placeholder="0.00" step="0.01"
                                    required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label text-muted small">CATEGORY</label>
                                <select id="prodCategory" class="form-select" required>
                                    <option value="" selected disabled>Select category</option>
                                    <option value="Main Dish">Main Dish</option>
                                    <option value="Appetizers">Appetizers</option>
                                    <option value="Drinks">Drinks</option>
                                    <option value="Desserts">Desserts</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label text-warning small">DISCOUNT PERCENTAGE (%)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-dark text-warning border-secondary">%</span>
                                    <input type="number" id="prodDiscount" class="form-control" placeholder="0" min="0"
                                        max="100">
                                </div>
                                <small class="text-white-50" style="font-size: 0.7rem;">Leave it 0 for no
                                    discount.</small>
                            </div>

                            <div class="col-md-12">
                                <label class="form-label text-muted small">STOCK QUANTITY</label>
                                <input type="number" id="prodQty" class="form-control" placeholder="How many in stock?"
                                    required>
                            </div>

                            <div class="col-md-12">
                                <label class="form-label text-muted small">DESCRIPTION</label>
                                <textarea id="prodDesc" class="form-control" rows="3"
                                    placeholder="Tell customers about this item..."></textarea>
                            </div>

                            <div class="col-md-12">
                                <label class="form-label text-muted small">PRODUCT IMAGE (URL or LOCAL PATH)</label>
                                <input type="text" id="prodImg" class="form-control"
                                    placeholder="../../images/burger.jpg">
                                <div id="imgPreview" class="text-center mt-3 d-none">
                                    <p class="small text-muted mb-2">Image Preview:</p>
                                    <img src="" alt="Preview"
                                        style="max-height: 150px; border-radius: 10px; border: 2px solid #ff7b00;">
                                </div>
                            </div>

                            <div class="col-md-12 mt-4">
                                <button type="submit" class="btn btn-submit w-100 py-3 fw-bold">
                                    <i class="fas fa-plus-circle me-2"></i>ADD PRODUCT TO SHOP
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../../js/owner/add-product.js"></script>
</body>

</html>
