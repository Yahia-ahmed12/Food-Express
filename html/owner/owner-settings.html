<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings | Owner Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/owner/owner-settings.css">
</head>

<body>
    <div class="container py-5">
        <div class="d-flex align-items-center mb-5">
            <button onclick="history.back()" class="btn btn-outline-light me-3 rounded-pill">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h2 class="mb-0 fw-bold">ACCOUNT <span class="text-warning">SETTINGS</span></h2>
        </div>

        <div class="settings-container shadow-lg">
            <div class="row g-0">
                <div class="col-md-4 settings-sidebar">
                    <div class="nav flex-column nav-pills" id="v-pills-tab" role="tablist">
                        <button class="nav-link active text-start" id="v-pills-profile-tab" data-bs-toggle="pill"
                            data-bs-target="#v-pills-profile" type="button" role="tab">
                            <i class="fas fa-user-circle me-2"></i> Profile Info
                        </button>
                        <button class="nav-link text-start" id="v-pills-security-tab" data-bs-toggle="pill"
                            data-bs-target="#v-pills-security" type="button" role="tab">
                            <i class="fas fa-shield-alt me-2"></i> Password & Security
                        </button>
                    </div>
                </div>

                <div class="col-md-8 p-4 p-lg-5">
                    <div class="tab-content" id="v-pills-tabContent">
                        <div class="tab-pane fade show active" id="v-pills-profile" role="tabpanel">
                            <h4 class="text-white mb-4">Profile Information</h4>

                            <div class="d-flex flex-column align-items-center mb-4">
                                <div class="avatar-wrapper">
                                    <div id="avatarDisplay">
                                        <span id="avatarInitials">--</span>
                                        <img src="" id="settingsImgPreview" class="d-none">
                                    </div>
                                    <label for="ownerFileSubmit" class="camera-btn">
                                        <i class="fas fa-camera"></i>
                                    </label>
                                    <input type="file" id="ownerFileSubmit" accept="image/*" class="d-none">
                                </div>
                                <button type="button" id="removePhotoBtn" class="btn btn-sm text-danger border-0">
                                    <i class="fas fa-trash-alt me-1"></i> Remove Photo
                                </button>
                            </div>

                            <form id="profileUpdateForm">
                                <div class="row g-3">
                                    <div class="col-md-12">
                                        <label class="form-label font-oswald small text-muted">FULL NAME</label>
                                        <input type="text" id="editOwnerName" class="form-control"
                                            placeholder="Enter your name" required>
                                    </div>
                                    <div class="col-12 mt-4 text-center">
                                        <button type="submit" class="btn btn-save w-100">Save Profile Changes</button>
                                    </div>
                                </div>
                            </form>
                        </div>

                        <div class="tab-pane fade" id="v-pills-security" role="tabpanel">
                            <h4 class="text-white mb-4">Update Password</h4>
                            <form id="passwordUpdateForm">
                                <div class="row g-3">
                                    <div class="col-md-12">
                                        <label class="form-label font-oswald small text-muted">CURRENT PASSWORD</label>
                                        <input type="password" id="currentPass" class="form-control" required>
                                    </div>
                                    <div class="col-md-12">
                                        <label class="form-label font-oswald small text-muted">NEW PASSWORD</label>
                                        <input type="password" id="newPass" class="form-control" required>
                                    </div>
                                    <div class="col-md-12">
                                        <label class="form-label font-oswald small text-muted">CONFIRM NEW
                                            PASSWORD</label>
                                        <input type="password" id="confirmPass" class="form-control" required>
                                    </div>
                                    <div class="col-12 mt-4 text-center">
                                        <button type="submit" class="btn btn-save w-100">Update Password</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../../js/owner/owner-settings.js"></script>
</body>

</html>
