<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/registerAndLogin.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Login</title>
</head>

<body>
    <div class="centered-page">
        <div class="box">
            <div class="form">
                <h2>Login</h2>
                <div class="input">
                    <div class="inputBox">
                        <label for="email">Email</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" autocomplete="email" placeholder="Email">
                        </div>
                        <small class="error" id="emailError"></small>
                    </div>
                    <div class="inputBox">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="Password">
                        </div>
                        <small class="error" id="passwordError"></small>
                    </div>
                    <div class="inputBox remmember">
                        <label for="remember">
                            <input type="checkbox" id="remember"> Remember Me
                        </label>
                    </div>
                    <div class="inputBox">
                        <input type="submit" id="loginSubmit" value="Sign In">
                    </div>

                </div>
                <p class="auth-redirect">
                    Don't have an account?
                    <a href="chooseRole.html">Sign Up Here</a>
                </p>
            </div>
        </div>


        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
            crossorigin="anonymous"></script>
        <script src="../js/Login.js"></script>

</body>

</html>
