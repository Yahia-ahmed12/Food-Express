<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - FoodExpress</title>

    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="../css/myOrder.css">


</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4" style="background-color: #212529 !important;">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="dashboard.html">
                FoodExpress
            </a>
            <div class="ms-auto d-flex align-items-center gap-3">
                <img id="navUserImg" src="" class="rounded-circle" width="35" height="35" alt="Profile">
                <span id="navUserName" class="text-white fw-bold">Guest</span>
                <button onclick="logout()" class="btn btn-sm btn-logout ms-2"><i
                        class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="orders-header d-flex justify-content-between align-items-center mb-5">
            <div>
                <h2 class="fw-bold text-white mb-1"><i class="fas fa-history text-warning me-2"></i>Order History</h2>
                <p class="text-muted small mb-0">Track and manage your previous delicious meals</p>
            </div>
            <div class="d-flex gap-2">
                <button onclick="clearAllOrders()"
                    class="btn btn-outline-danger px-4 py-2 fw-bold rounded-pill shadow-sm">
                    <i class="fas fa-trash-alt me-2"></i>Clear All
                </button>
                <a href="dashboard.html"
                    class="btn btn-warning px-4 py-2 fw-bold text-dark text-decoration-none rounded-pill shadow-sm">
                    <i class="fas fa-arrow-left me-2"></i>Back to Menu
                </a>
            </div>
        </div>
        <div id="ordersList" class="row g-4"></div>
    </div>

    <div class="modal fade" id="trackingModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title"><i class="fas fa-shipping-fast text-warning me-2"></i>Live Tracking</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0">
                    <div id="trackingMap"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="rateModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title text-warning">Rate Your Experience</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <div class="stars-rating mb-3 fs-2">
                        <i class="far fa-star star-btn" data-value="1"></i>
                        <i class="far fa-star star-btn" data-value="2"></i>
                        <i class="far fa-star star-btn" data-value="3"></i>
                        <i class="far fa-star star-btn" data-value="4"></i>
                        <i class="far fa-star star-btn" data-value="5"></i>
                    </div>
                    <textarea id="reviewText" class="form-control bg-secondary border-0 text-white"
                        placeholder="Write your feedback here..." rows="3"></textarea>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-warning fw-bold w-100" id="submitRateBtn">SUBMIT
                        REVIEW</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="../js/myOrder.js"></script>
    <script src="../js/common.js"></script>
</body>

</html>
