<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Menu | Owner Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/owner/manage-products.css">
</head>

<body style="background-color: #1a1b20; color: white; font-family: 'Oswald', sans-serif;">

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5 flex-wrap gap-3">
            <div class="d-flex align-items-center mb-4">
                <a href="my-shops.html" class="btn btn-outline-light me-3 back-btn-circle">
                    <i class="fas fa-arrow-left"></i>
                </a>

                <div class="d-flex flex-column">
                    <h2 class="fw-bold mb-0">Manage <span class="text-warning">Menu</span></h2>
                    <p class="text-white-50 small mb-0">Add and edit your products</p>
                </div>
            </div>

            <button id="addBtn" class="btn btn-add-new">
                <i class="fas fa-plus me-2"></i> ADD NEW PRODUCT
            </button>
        </div>

        <div class="row g-4" id="productsContainer">
        </div>

        <div id="noProducts" class="text-center py-5" style="display: none;">
            <div class="empty-icon-wrapper mb-4">
                <i class="fas fa-utensils fa-4x text-warning opacity-50"></i>
            </div>
            <h4 class="text-white opacity-75">Your menu is empty.</h4>
            <p class="text-muted">Start adding delicious items to your shop!</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../../js/owner/manage-products.js"></script>
</body>

</html>
