<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - FoodExpress</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../css/profile.css">
</head>

<body class="bg-dark text-white">

    <nav class="navbar navbar-dark bg-dark border-bottom border-secondary p-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="dashboard.html">
                FoodExpress
            </a>
            <a href="dashboard.html" class="btn btn-outline-warning btn-sm rounded-pill px-4">
                <i class="fas fa-arrow-left me-2"></i>Back
            </a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="profile-card p-4 shadow-lg text-center">

                    <div class="mb-4">
                        <div class="position-relative d-inline-block">
                            <img id="profileImgPreview" src="https://via.placeholder.com/150"
                                class="rounded-circle border border-4 border-warning shadow-lg" width="150" height="150"
                                style="object-fit: cover;">

                            <label for="imgUpload" class="btn-edit-photo shadow" title="Change Photo">
                                <i class="fas fa-camera"></i>
                            </label>
                            <input type="file" id="imgUpload" hidden accept="image/*">
                        </div>

                        <div class="mt-3 d-flex justify-content-center gap-2">
                            <button type="button" class="btn btn-outline-danger btn-sm px-3 rounded-pill"
                                onclick="removeProfileImage()">
                                <i class="fas fa-trash-alt me-1"></i> Remove Photo
                            </button>
                        </div>
                    </div>

                    <h3 id="displayUserName" class="fw-bold mb-1">User Name</h3>
                    <p id="displayEmail" class="text-muted small mb-4">user@example.com</p>

                    <form id="profileForm" class="text-start">
                        <div class="mb-4 input-group-custom">
                            <label class="form-label text-warning small fw-bold">Full Name</label>
                            <div class="position-relative">
                                <i class="fas fa-user input-icon"></i>
                                <input type="text" id="editName" class="form-control"
                                    placeholder="Enter your full name">
                            </div>
                        </div>

                        <div class="mb-4 input-group-custom">
                            <label class="form-label text-warning small fw-bold">Phone Number</label>
                            <div class="position-relative">
                                <i class="fas fa-phone input-icon"></i>
                                <input type="tel" id="editPhone" class="form-control" placeholder="Enter your number">
                            </div>
                        </div>

                        <div class="mb-4 input-group-custom">
                            <label class="form-label text-warning small fw-bold">Email Address</label>
                            <div class="position-relative">
                                <i class="fas fa-envelope input-icon"></i>
                                <input type="email" id="editEmail" class="form-control" placeholder="Enter your email">
                            </div>
                        </div>

                        <div class="mb-4 input-group-custom">
                            <label class="form-label text-warning small fw-bold">Saved Address</label>
                            <div class="position-relative">
                                <i class="fas fa-map-marker-alt input-icon" style="top: 25px;"></i>
                                <textarea id="editAddress" class="form-control" rows="2" readonly
                                    placeholder="Address from map..."></textarea>
                            </div>
                            <small class="text-white-50 mt-1 d-block" style="font-size: 0.7rem;">Update this from the
                                Dashboard map.</small>
                        </div>

                        <button type="submit" class="btn btn-save w-100 py-3 fw-bold mt-2">
                            <i class="fas fa-check-circle me-2"></i>SAVE CHANGES
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../js/profile.js"></script>
</body>

</html>
