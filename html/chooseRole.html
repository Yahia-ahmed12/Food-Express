<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/registerAndLogin.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Create Account - Select Your Role</title>
</head>

<body>
    <div class="centered-page">
        <div class="box role">
            <div class="form">
                <div class="role-selection">
                    <h2>Choose Your Role</h2>

                    <div class="role-options">
                        <div class="role-card">
                            <input type="radio" id="owner" name="role">
                            <label for="owner">
                                <i class="fas fa-crown"></i>
                                <span>Owner</span>
                            </label>
                        </div>
                        <div class="role-card">
                            <input type="radio" id="customer" name="role" checked>
                            <label for="customer">
                                <i class="fas fa-user"></i>
                                <span>Customer</span>
                            </label>
                        </div>

                        <div class="role-card">
                            <input type="radio" id="driver" name="role">
                            <label for="driver">
                                <i class="fas fa-car"></i>
                                <span>Driver</span>
                            </label>
                        </div>


                    </div>

                    <div class="continue-btn">
                        <button id="btn">Continue</button>
                    </div>
                </div>
            </div>
        </div>
    </div>













    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="../js/role-selection.js"></script>
</body>

</html>
