<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shops | Owner Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <link rel="stylesheet" href="../../css/owner/my-shops.css">

</head>

<body>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div class="d-flex align-items-center">
                <button onclick="location.href='home.html'" class="btn btn-outline-light me-3"
                    style="padding: 12px; display: flex; align-items: center; justify-content: center;"">
                    <i class=" fas fa-arrow-left"></i>
                </button>

                <div>
                    <h2 class="fw-bold mb-0">My <span class="text-warning">Shops</span></h2>
                    <p class="text-white-50 small mb-0">Manage your business locations</p>
                </div>
            </div>

            <a href="add-shop.html" class="btn btn-submit d-flex align-items-center"
                style="background: #ff7b00; color: white !important; padding: 10px 20px; font-weight: bold; border-radius: 8px; border: none;">
                <i class="fas fa-plus me-2"></i> ADD NEW SHOP
            </a>
        </div>

        <div class="row g-4" id="shopsContainer">
        </div>

        <div id="noShops" class="empty-state" style="display: none;">
            <i class="fas fa-store-slash fa-4x mb-3"></i>
            <h4>No shops found. Add your first shop now!</h4>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../../js/owner/my-shops.js"></script>
</body>

</html>
