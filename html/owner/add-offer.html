<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Special Offer | Owner Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../../css/owner/add-offer.css">
</head>

<body class="owner-body">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="d-flex align-items-center mb-4">
                    <a href="manage-offers.html" class="btn btn-outline-light me-3">
                        <i class="fas fa-arrow-left"></i>
                    </a>
                    <div>
                        <h2 class="fw-bold mb-0 text-white">Create <span class="text-warning">New Offer</span></h2>
                        <p class="text-white-50 small mb-0">Promote your shop with attractive banners</p>
                    </div>
                </div>

                <div class="form-container shadow-lg">
                    <form id="addOfferForm">
                        <div class="row g-4">
                            <div class="col-md-12">
                                <label class="form-label">OFFER MAIN TITLE</label>
                                <input type="text" id="offerTitle" class="form-control"
                                    placeholder="e.g. 50% OFF on all Pizzas" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">SUBTITLE / SMALL TEXT</label>
                                <input type="text" id="offerSubtitle" class="form-control"
                                    placeholder="e.g. Limited Time Offer" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">TARGET CATEGORY</label>
                                <select id="offerSearchTerm" class="form-select" required>
                                    <option value="" selected disabled>Select Category</option>
                                    <option value="Pizza">Pizza</option>
                                    <option value="Burgers">Burgers</option>
                                    <option value="Healthy">Healthy</option>
                                    <option value="Pharmacy">Pharmacy</option>
                                    <option value="Drinks">Drinks</option>
                                    <option value="Italian">Italian</option>
                                </select>
                            </div>

                            <div class="col-md-12">
                                <label class="form-label">UPLOAD BANNER IMAGE</label>
                                <input type="file" id="offerFile" class="form-control" accept="image/*" required>
                            </div>

                            <div class="col-md-12 mt-5 text-end">
                                <button type="submit" class="btn btn-submit w-100 py-3">
                                    <i class="fas fa-paper-plane me-2"></i>PUBLISH OFFER NOW
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../../js/owner/add-offer.js"></script>
</body>

</html>
